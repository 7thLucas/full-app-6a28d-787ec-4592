apiVersion: skaffold/v4beta14
kind: Config
build:
  local:
    push: true
  tagPolicy:
    envTemplate:
      template: "latest"
  artifacts:
  - image: quantumteknologi/qb-remix-base
    context: .
    custom:
      buildCommand: "docker inspect quantumteknologi/qb-remix-base:latest > /dev/null"
      dependencies:
        paths:
          - '**/*'
          - '.env'
        ignore:
          - '.git/**'
          - 'k8s/**'
          - 'skaffold.yaml'
          - 'node_modules/**'
          - '.skaffold/**'
    sync:
      manual:
        - src: '**/*'
          dest: '/app'
        - src: '.env'
          dest: '/app'

manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
