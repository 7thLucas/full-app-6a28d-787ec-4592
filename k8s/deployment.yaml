apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip7eomrs-4592-development
  namespace: qb-prototypes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ip7eomrs-4592-development
  template:
    metadata:
      labels:
        app: ip7eomrs-4592-development
    spec:
      imagePullSecrets:
      - name: qtn-dockerhub
      containers:
      - name: web
        image: quantumteknologi/qb-remix-base:latest
        imagePullPolicy: IfNotPresent
        command: ["/usr/local/bin/entrypoint.sh"]
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        volumeMounts:
        - name: app-source
          mountPath: /app
      volumes:
      - name: app-source
        emptyDir: {}
